<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elotes Party</title>

<style>

body{ 
    margin: 0;
    padding:20px;
    height: auto;
    background: linear-gradient(90deg, #8a2be2, #ff69b4, #ffd60a);
    font-family: Arial, sans-serif;
}	

.contenedor-dorado{
    border: 6px solid transparent;
    border-image: linear-gradient(
        45deg,
        #FFD700,
        #FFF8DC,
        #FFC107,
        #FFD700
    ) 1;

    border-radius: 25px;
    box-shadow:
        0 0 15px rgba(255,215,0,0.7),
        0 0 30px rgba(255,215,0,0.4);

    margin-bottom: 20px;
}

header{
    padding:8px;
    text-align:center;
    color:white;
    background: linear-gradient(90deg, #8a2be2, #ff69b4, #ffd60a);
}

header h1{
    color:#FFD700;
    font-size:100px;
    font-style:italic;
    font-family:"Brush Script MT", cursive;
}

header h2{
    color:#7A008F;
    font-size:50px;
    font-style:italic;
    font-family:"Brush Script MT", cursive;
}

nav{
    background:#6ec6ff;
    padding:18px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    color:#6a1b9a;
}

.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    gap:40px;
    padding:60px 30px;
    background: rgba(255,255,255,0.15);
}

.logo{
    width:300px;
    border-radius:25px;
    border:4px solid #FFD700;
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

.hero-text{
    max-width:500px;
}

.hero-text h2{
    font-size:48px;
    color:#FFD700;
    text-shadow: 0 0 10px #FFD700;
}

.hero-text p{
    font-size:24px;
    font-family:Consolas, monospace;
    line-height:1.8;
}

.qr-seccion{
    text-align:center;
    padding:40px;
    background: rgba(255,255,255,0.12);
}

.qr-contenedor{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.qr-img{
    width:500px;
    height:500px;
    border-radius:20px;
    border:5px solid #FFD700;
    box-shadow:
        0 0 15px rgba(255,215,0,0.8),
        0 0 30px rgba(255,215,0,0.5);
}

.video-box{
    display:flex;
    justify-content:flex-start;
    padding-left:40px;
    margin-top:30px;
    margin-bottom:20px;
}

.video-box video{
    width:180px; 
    height:auto;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

footer{
    text-align:center;
    padding:20px;
    color:#6a1b9a;
    background: linear-gradient(90deg,#ff69b4,#ffffff,#ff1493);
}

</style>
</head>

<body>

<header class="contenedor-dorado">
    <h1>Elotes Party</h1>
    <h2>¡El antojo que sí vale la pena!</h2>
</header>

<nav class="contenedor-dorado">
    <a href="indexx.html">INICIO</a>
    <a href="PAGINAS/CONOCENOS.html">CONÓCENOS</a>
    <a href="PAGINAS/MENU.html">MENÚ</a>
    <a href="PAGINAS/PROMOCIONES.html">PROMOCIONES</a>
    <a href="PAGINAS/EVENTOS.html">EVENTOS</a>
    <a href="PAGINAS/CONTACTO.html">CONTACTO</a>
</nav>

<section class="hero contenedor-dorado">

    <img src="IMAGENES/animacion.jpeg" class="logo" alt="">

    <div class="hero-text">
        <h2>En <strong>Elotes Party</strong></h2>

        <audio autoplay loop>
            <source src="AUDIO/musica fondo.mp3" type="audio/mpeg">
        </audio>

        <p>
            "No solo vendemos elotes, creamos momentos llenos de sabor y alegría."
        </p>
    </div>

</section>

<section class="qr-seccion contenedor-dorado">

    <h2>📲 Escanea nuestro QR</h2>

    <div class="qr-contenedor">
        <img src="IMAGENES/QR.jpeg" class="qr-img" alt="">
        <img src="IMAGENES/LOGOO.jpeg" class="logo" alt="">
    </div>

</section>

<div class="video-box">
    <video controls>
        <source src="VIDEOS/animacion.mp4" type="video/mp4">
    </video>
</div>

<footer class="contenedor-dorado">
    <p>Elotes Party | 04 de junio de 2026</p>
</footer>

</body>
</html>
